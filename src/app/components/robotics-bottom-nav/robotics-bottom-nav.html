<nav
  class="fixed bottom-0 left-0 right-0 z-50 flex justify-around items-center gap-1 px-2 py-2
         border-t border-slate-800/80 bg-slate-950/95 backdrop-blur-md pb-[max(0.5rem,env(safe-area-inset-bottom))]"
  aria-label="Navegación robótica">
  @for (link of links; track link.route) {
    <a
      [routerLink]="link.route"
      routerLinkActive="text-secondary bg-blue-900/25"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex flex-col items-center justify-center min-w-0 flex-1 py-2 rounded-lg text-slate-500
             hover:text-slate-200 transition-colors no-underline max-w-[5rem]">
      <span class="material-symbols-outlined" style="font-size: 1.35rem; font-variation-settings: 'FILL' 1;">
        {{ link.icon }}
      </span>
      <span class="font-label text-[8px] font-bold uppercase tracking-wide mt-0.5 truncate w-full text-center">
        {{ link.label }}
      </span>
    </a>
  }
</nav>
